data:
  source: "~/kitti_dataset/"
  sequence: "0000"
  output_topic: "/lidar_perception_tracker/streams/pointcloud"
  publish_rate: 10.0

preprocessing:
  output_topic: "/lidar_perception_tracker/streams/pointcloud_preprocessed"
  voxel_size: 0.2
  min_distance: 2.0
  max_distance: 50.0
  ground_threshold: 0.2

detection:
  output_topic: "/lidar_perception_tracker/streams/detections"
  mode: "point_pillars"
  point_pillars:
    model_path: "models/pointpillar_7728.pth"
    nms_threshold: 0.5
    conf_threshold: 0.3
    device: "cuda"
  euclidean:
    eps: 1.259
    min_points: 12
    min_h: 0.5
    max_h: 2.5
    min_w: 0.3
    max_w: 2.5
    min_l: 0.5
    max_l: 5.5
    max_center_z: 1.651
  
tracking:
  output_topic: "/lidar_perception_tracker/streams/tracks"
  use_kalman_filter: true
  kalman_process_noise: 1e-5
  kalman_measurement_noise: 1e-2
  kalman_initial_state_covariance: 1.0
  kalman_initial_measurement_covariance: 1.0
  euclidean:
    max_age: 5
    min_hits: 3
    match_distance: 2.0
  point_pillars:
    max_age: 5
    min_hits: 1
    match_distance: 1.5

evaluation:
  match_distance: 2.0   # max 3D center distance (m) to count as a true positive